<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShockTV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <div class="nav-logo" onclick="goHome()">SHOCK<span>TV</span></div>
      <div class="nav-links">
        <button class="nav-btn active" id="btn-home" onclick="setSection('home')">Inicio</button>
        <button class="nav-btn" id="btn-movies" onclick="setSection('movies')">Películas</button>
        <button class="nav-btn" id="btn-tv" onclick="setSection('tv')">Series</button>
        <button class="nav-btn" id="btn-toprated" onclick="setSection('toprated')">Top Rated</button>
      </div>
      <div class="nav-search">
        <input type="text" id="search-input" placeholder="Buscar..." autocomplete="off" />
        <button onclick="doSearch()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <section class="hero" id="hero-section">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content" id="hero-content">
      <div class="hero-badge">EN TENDENCIA</div>
      <h1 class="hero-title" id="hero-title">Cargando...</h1>
      <p class="hero-desc" id="hero-desc"></p>
      <div class="hero-meta" id="hero-meta"></div>
      <div class="hero-buttons">
        <button class="btn-play" id="hero-play-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          Ver ahora
        </button>
        <button class="btn-info" id="hero-info-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Más info
        </button>
      </div>
    </div>
    <div class="hero-scroll-hint">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </div>
  </section>

  <main class="main" id="main-content">
    <section class="content-section hidden" id="search-section">
      <h2 class="section-title">Resultados de búsqueda</h2>
      <div class="grid-cards" id="search-results"></div>
    </section>

    <div id="home-sections">
      <section class="content-section">
        <h2 class="section-title"><span class="title-accent">🔥</span> Tendencias esta semana</h2>
        <div class="slider-wrapper">
          <button class="slider-btn left" onclick="slide('trending-slider',-1)">‹</button>
          <div class="cards-slider" id="trending-slider"></div>
          <button class="slider-btn right" onclick="slide('trending-slider',1)">›</button>
        </div>
      </section>
      <section class="content-section">
        <h2 class="section-title"><span class="title-accent">🎬</span> Películas populares</h2>
        <div class="slider-wrapper">
          <button class="slider-btn left" onclick="slide('movies-slider',-1)">‹</button>
          <div class="cards-slider" id="movies-slider"></div>
          <button class="slider-btn right" onclick="slide('movies-slider',1)">›</button>
        </div>
      </section>
      <section class="content-section">
        <h2 class="section-title"><span class="title-accent">📺</span> Series populares</h2>
        <div class="slider-wrapper">
          <button class="slider-btn left" onclick="slide('tv-slider',-1)">‹</button>
          <div class="cards-slider" id="tv-slider"></div>
          <button class="slider-btn right" onclick="slide('tv-slider',1)">›</button>
        </div>
      </section>
    </div>

    <div id="movies-section" class="hidden">
      <h2 class="section-title page-title">🎬 Películas</h2>
      <div class="grid-cards" id="movies-grid"></div>
    </div>
    <div id="tv-section" class="hidden">
      <h2 class="section-title page-title">📺 Series</h2>
      <div class="grid-cards" id="tv-grid"></div>
    </div>
    <div id="toprated-section" class="hidden">
      <h2 class="section-title page-title">⭐ Top Rated</h2>
      <div class="grid-cards" id="toprated-grid"></div>
    </div>
  </main>

  <div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-backdrop" id="modal-backdrop"></div>
      <div class="modal-body">
        <div class="modal-poster-wrap">
          <img class="modal-poster" id="modal-poster" src="" alt="" />
        </div>
        <div class="modal-info">
          <div class="modal-badges" id="modal-badges"></div>
          <h2 class="modal-title" id="modal-title"></h2>
          <div class="modal-meta" id="modal-meta"></div>
          <p class="modal-overview" id="modal-overview"></p>
          <div class="modal-cast" id="modal-cast"></div>
          <div class="modal-trailer" id="modal-trailer"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="loading-overlay hidden" id="loading-overlay">
    <div class="loader">
      <div class="loader-logo">SHOCK<span>TV</span></div>
      <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2025 ShockTV — Datos por <a href="https://www.themoviedb.org" target="_blank">TMDB</a></p>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
